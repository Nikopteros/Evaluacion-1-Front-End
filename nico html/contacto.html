<body id="arriba">
    <header>
        <h1>Búhos</h1>
        <p>¿Tienes dudas? Ponte en contacto</p>
    </header>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="detalles.html">Detalles</a>
        <a href="galeria.html">Galería de imagenes</a>
        <a href="contacto.html">Formulario de contacto</a>
    </nav>
    <main>
        <h2>Ingrese sus datos aquí para ponerse en contacto con nuestro equipo</h2>
        <hr>
        <form>
        
          <div class="form-grupo">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" required placeholder="Juan Perez">
          </div>
      
          <div class="form-grupo">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" required placeholder="jperez@mail.com">
          </div>
      
          <div class="form-grupo">
            <label for="fecha">Fecha de nacimiento</label>
            <input type="date" id="fecha" required>
          </div>
      
          <div class="form-boton">
            <button type="submit">Enviar</button>
            <button type="reset">Restablecer</button>
          </div>
      
        </form>
    </main>
    <footer>
        <p>Mi sitio &copy;2026 | Nicolás Román | Analista Programador - Inacap</p>
    </footer>
</body>
</html>
